<div class="page-wrapper">
  @if (isStandalone) {
    <header class="standalone-header">
      <span class="app-brand">Anime Vote</span>
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        {{ isDark() ? '☀' : '🌙' }}
      </button>
    </header>
  }

  <main class="content">
    <section class="hero-section">
      <h1 class="hero-title">Anime Character Votes</h1>
      <p class="hero-sub">Click a photo to vote. Results update in real time.</p>
    </section>

    <section class="featured-section">
      <div class="section-label">Featured Poll</div>
      <app-poll-card [poll]="featuredPoll" />
    </section>

    <section class="more-polls-section">
      <div class="section-label">More Battles</div>
      <div class="polls-grid">
        @for (poll of polls.slice(1); track poll.id) {
          <app-poll-card [poll]="poll" />
        }
      </div>
    </section>
  </main>
</div>
