<div class="page-wrapper">

  @if (isStandalone) {
    <header class="standalone-header">
      <span class="app-brand">⚔ Anime Vote</span>
      <button class="theme-toggle"
              (click)="toggleTheme()"
              [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        {{ isDark() ? '☀' : '🌙' }}
      </button>
    </header>
  }

  <main class="poll-stage">

    <!-- Invisible side nav buttons -->
    <button class="side-nav side-prev" (click)="prev()" aria-label="Previous poll">&#8592;</button>
    <button class="side-nav side-next" (click)="next()" aria-label="Next poll">&#8594;</button>

    <!-- Poll -->
    <app-poll-card [poll]="currentPoll()" (castVote)="onVote($event)" />

    <!-- History button -->
    <button class="history-btn" (click)="openHistory()" aria-label="Vote history">
      <span class="history-icon">🗳</span>
      <span class="history-label">History</span>
      @if (votedCount() > 0) {
        <span class="history-badge">{{ votedCount() }}</span>
      }
    </button>

    <!-- Auto-advance progress -->
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progressPct()"></div>
    </div>

  </main>

</div>

<!-- Vote history drawer (outside main so it overlays everything) -->
@if (showHistory()) {
  <app-vote-history (closeHistory)="closeHistory()" />
}
