<div class="page-wrapper">

  @if (isStandalone) {
    <header class="standalone-header">
      <span class="app-brand">⚔ Anime Vote</span>

      <div class="header-actions">
        @if (isLoggedIn()) {
          <button class="admin-btn" (click)="openManagement()" aria-label="Management">⚙ Manage</button>
          <span class="username-chip">{{ currentUser()?.username }}</span>
          <button class="login-btn" (click)="logout()">Logout</button>
        } @else {
          <button class="login-btn" (click)="openAuth()">Login</button>
        }
        <button class="theme-toggle"
                (click)="toggleTheme()"
                [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
          {{ isDark() ? '☀' : '🌙' }}
        </button>
      </div>
    </header>
  }

  <main class="poll-stage">

    <button class="side-nav side-prev" (click)="prev()" aria-label="Previous poll">&#8592;</button>
    <button class="side-nav side-next" (click)="next()" aria-label="Next poll">&#8594;</button>

    @if (currentAsSingle(); as poll) {
      <app-poll-card [poll]="poll" (castVote)="onVote($event)" />
    } @else if (currentAsMulti(); as poll) {
      <app-multi-poll-card [poll]="poll" (castVote)="onVote($event)" />
    }

    <button class="history-btn" (click)="openHistory()" aria-label="Vote history">
      <span class="history-icon">🗳</span>
      <span class="history-label">History</span>
      @if (votedCount() > 0) {
        <span class="history-badge">{{ votedCount() }}</span>
      }
    </button>

    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progressPct()"></div>
    </div>

  </main>

</div>

<!-- Vote history drawer -->
@if (showHistory()) {
  <app-vote-history (closeHistory)="closeHistory()" />
}

<!-- Auth modal -->
@if (showAuth()) {
  <app-auth-modal (close)="closeAuth()" />
}

<!-- Management panel -->
@if (showManagement()) {
  <app-management (close)="closeManagement()" />
}

<!-- Toast notifications -->
<app-toast />
