<div class="page-wrapper">

  @if (isStandalone) {
    <header class="standalone-header">
      <span class="app-brand">⚔ Anime Vote</span>
      <button class="theme-toggle"
              (click)="toggleTheme()"
              [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        {{ isDark() ? '☀' : '🌙' }}
      </button>
    </header>
  }

  <main class="poll-stage">

    <app-poll-card [poll]="currentPoll()" (castVote)="onVote($event)" />

    <nav class="poll-nav">
      <button class="nav-btn" (click)="prev()" aria-label="Previous poll">&#8592;</button>
      <div class="nav-counter">
        <span class="nav-cur">{{ currentIndex() + 1 }}</span>
        <span class="nav-sep">&nbsp;/&nbsp;</span>
        <span class="nav-tot">{{ totalPolls }}</span>
      </div>
      <button class="nav-btn" (click)="next()" aria-label="Next poll">&#8594;</button>
    </nav>

    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progressPct()"></div>
    </div>

  </main>

</div>
